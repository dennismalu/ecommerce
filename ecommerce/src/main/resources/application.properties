spring.application.name=ecommerce
server.port=8080


DBNAME=ecommercePiattaforme
POSTGRES_USER=postgres
POSTGRES_PASSWORD=postgres

spring.datasource.url=jdbc:postgresql://localhost:5432/${DBNAME}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Dialetto Hibernate per PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Creazione automatica delle tabelle
spring.jpa.hibernate.ddl-auto=update
# Abilita il log delle query SQL
spring.jpa.show-sql=true

# Abilita il formato leggibile delle query SQL --> dopo un po' e' scomodo
# spring.jpa.properties.hibernate.format_sql=true



# Abilitazione cache (Spring Boot usa ConcurrentMapCache di default: no ttl)
# spring.cache.type=simple
# caching.spring.personeCacheTTL=10000


