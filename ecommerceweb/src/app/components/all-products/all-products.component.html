<div class="container">


 <!-- Filtri e ordinamento -->
  <div class="filters-section" *ngIf="products.length > 0">
    <div nz-row nzGutter="16" nzAlign="middle">
      <!-- Filtro per categoria -->
      <div nz-col nzSpan="8">
        <label nz-label>Categoria:</label>
        <nz-select 
          class="filter-control"
          nzPlaceHolder="Seleziona categoria" 
          style="width: 100%" 
          [(ngModel)]="selectedCategory"
          (ngModelChange)="onCategoryChange()">
          <nz-option 
            *ngFor="let category of categoryOptions" 
            [nzValue]="category.value" 
            [nzLabel]="category.label">
          </nz-option>
        </nz-select>
      </div>

      <!-- Ordinamento -->
      <div nz-col nzSpan="8">
        <label nz-label>Ordina per:</label>
        <nz-select 
          class="filter-control"
          nzPlaceHolder="Ordina prodotti" 
          style="width: 100%" 
          [(ngModel)]="selectedSort"
          (ngModelChange)="onSortChange()">
          <nz-option 
            *ngFor="let option of sortOptions" 
            [nzValue]="option.value" 
            [nzLabel]="option.label">
          </nz-option>
        </nz-select>
      </div>

      <!-- Reset filtri -->
      <div nz-col nzSpan="8">
        <button 
          class="filter-control"
          nz-button 
          nzType="default" 
          nzSize="large"
          style="margin-top: 24px; width: 100%"
          (click)="resetFilters()">
          <i nz-icon nzType="reload"></i>
          Reset Filtri
        </button>
      </div>
    </div>
  </div>






  <!-- Messaggio quando non ci sono prodotti -->
  <div *ngIf="products.length === 0" class="no-products">
    <h3 *ngIf="selectedCategory === -1">Nessun prodotto disponibile</h3>
    <h3 *ngIf="selectedCategory !== -1">Nessun prodotto nella categoria selezionata</h3>
    <p>Non ci sono prodotti da visualizzare al momento.</p>
    <button *ngIf="selectedCategory !== -1" nz-button nzType="primary" (click)="resetCategory()">
      Mostra tutti i prodotti
    </button>
  </div>






 









  <!-- Griglia prodotti -->
  <div class="product-grid">
    <div class="child" *ngFor="let product of products"> 

      <div nz-row> 
        <div nz-col nzSpan="8"> 
          <img class="profile" [src]="product.image" alt="immagine_prodotto" />
        </div> 
        
        <div nz-col nzSpan="16"> 
          <h2> {{ product.name }} </h2> 
          <p>{{ product.description }}</p> 
          
          <hr />  <!-- barra orizzontale -->

          <h5> 
            Prezzo: <b class="price">{{ product.price }}€</b> - 
            Categoria: <b class="category">{{ product.categoryName }}</b> 
          </h5> 

          <hr /> 

           <!-- tasti "Modifica" ed "Elimina" SOLO per admin -->
          <div style="float: right" *ngIf="isAdminLoggedIn"> 
            <button style="margin-left: 10px" nzSize="small" nz-button nzType="primary" routerLink="/admin/product/{{product.id}}"> 
              Modifica 
            </button> 

            <!-- nzDanger: colore rosso -->
            <button style="margin-left: 10px" nzSize="small" nz-button nzType="primary" nzDanger (click)="deleteProduct(product.id)"> 
              Elimina 
            </button> 
          </div>

        </div> 
      </div> 
    </div> 
  </div>
</div>
